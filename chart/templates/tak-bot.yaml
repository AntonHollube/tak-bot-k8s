# Nachbau von docker-compose "tak-bot": haengt an tak-server (mTLS-Stream), daher
# aus demselben Grund vorerst deaktiviert (values.takBot.enabled=false).
{{- if .Values.takBot.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tak-bot
  labels:
    app: tak-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tak-bot
  template:
    metadata:
      labels:
        app: tak-bot
    spec:
      containers:
        - name: tak-bot
          image: {{ .Values.takBot.image }}
          command: ["python", "manager.py"]
          env:
            - name: TAK_HOST
              value: "tak-server"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
{{- end }}
