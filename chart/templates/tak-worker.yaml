# Nachbau von docker-compose "tak-worker": ruft ausschliesslich oeffentliche APIs
# (Overpass, PegelOnline) ab und schreibt JSON-Caches. Braucht keinen TAK-Server,
# daher als einziger Bot-Baustein hier live und risikofrei lauffaehig.
{{- if .Values.takWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tak-worker
  labels:
    app: tak-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tak-worker
  template:
    metadata:
      labels:
        app: tak-worker
    spec:
      containers:
        - name: tak-worker
          image: {{ .Values.takWorker.image }}
          imagePullPolicy: IfNotPresent
          command: ["python", "task_worker.py"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
{{- end }}
